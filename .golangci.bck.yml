run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - noctx
    - bodyclose
    - contextcheck
    - exhaustive
    - forcetypeassert
    - nilerr
    - wrapcheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/Mozes721/portfolio-pulse
  wrapcheck:
    ignoreSigs:
      - fmt.Errorf(

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - wrapcheck
        - errcheck
